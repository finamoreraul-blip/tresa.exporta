<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tienda - MARKET</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0A0A0A; --card: #1C1C1C; --text: #F5F5F5; --gold: #D4AF37; --blue-ar: #3483FA; --green: #00A650; --red: #E63946; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
    body { background: var(--bg); color: var(--text); padding-bottom: 80px; }
 .topbar { background: #000; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 100; }
 .logo { font-size: 24px; font-weight: 900; color: var(--gold); cursor: pointer; }
 .cart-btn { position: relative; font-size: 26px; cursor: pointer; }
 .cart-count { position: absolute; top: -6px; right: -6px; background: var(--red); color: white; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
 .store-cover { height: 250px; background: #222; background-size: cover; background-position: center; }
 .store-header { max-width: 1200px; margin: -50px auto 0; padding: 0 20px; display: flex; gap: 20px; align-items: flex-end; }
 .store-avatar { width: 120px; height: 120px; border-radius: 50%; background: #222; border: 4px solid var(--bg); background-size: cover; background-position: center; flex-shrink: 0; }
 .store-info { flex: 1; padding-bottom: 20px; }
 .store-info h1 { font-size: 32px; font-weight: 900; }
 .store-info p { color: #A0A0A0; }
 .store-stats { display: flex; gap: 10px; margin-top: 10px; font-size: 14px; flex-wrap: wrap; }
 .store-stats span { background: var(--card); padding: 5px 12px; border-radius: 20px; border: 1px solid #222; }
 .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
 .store-desc { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #222; }
 .prod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px; }
 .prod-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
 .prod-card:hover { border-color: var(--gold); transform: translateY(-5px); }
 .prod-card img { width: 100%; height: 240px; object-fit: cover; cursor: pointer; }
 .prod-info { padding: 18px; }
 .prod-store { font-size: 12px; color: #A0A0A0; margin-bottom: 5px; }
 .prod-info h3 { font-size: 16px; margin-bottom: 8px; min-height: 40px; }
 .price { font-size: 24px; font-weight: 900; color: var(--blue-ar); margin-bottom: 10px; }
 .btn-group { display: flex; gap: 8px; flex-direction: column; }
 .btn-small { padding: 12px; font-size: 14px; border-radius: 8px; width: 100%; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; }
 .btn-small.comprar { background: var(--green); color: #000; }
 .btn-small.agregar { background: var(--gold); color: #000; }
 .btn-small:hover { opacity: 0.8; }
 .btn-small.added { background: var(--green); color: #fff; }
 .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 300; display: none; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
 .modal-overlay.active { display: flex; }
 .modal-content { background: var(--card); border-radius: 15px; max-width: 1000px; width: 100%; display: flex; gap: 30px; padding: 30px; position: relative; }
 .modal-close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #A0A0A0; }
 .modal-img { width: 400px; height: 400px; object-fit: cover; border-radius: 10px; }
 .modal-info { flex: 1; }
 .modal-info h2 { font-size: 26px; margin-bottom: 10px; }
 .modal-price { font-size: 38px; font-weight: 900; color: var(--blue-ar); margin: 15px 0; }
 .seller-box { background: #222; padding: 15px; border-radius: 10px; margin: 15px 0; }
 .modal-content-checkout { background: var(--card); border-radius: 15px; max-width: 700px; width: 100%; padding: 30px; }
 .checkout-form { display: flex; flex-direction: column; gap: 15px; }
 .checkout-form input { padding: 14px; background: #111; border: 1px solid #333; border-radius: 8px; color: var(--text); }
 .form-row { display: flex; gap: 15px; }
 .shipping-result { background: #222; padding: 15px; border-radius: 8px; margin-top: 10px; display: none; }
 .btn-pay { background: var(--green); color: #000; padding: 16px; border: none; border-radius: 8px; font-weight: 900; font-size: 16px; cursor: pointer; width: 100%; }
 .cart-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 199; display: none; }
 .cart-overlay.active { display: block; }
 .cart-sidebar { position: fixed; top: 0; right: -400px; width: 400px; height: 100vh; background: var(--card); z-index: 200; transition: 0.3s; padding: 20px; overflow-y: auto; }
 .cart-sidebar.active { right: 0; }
 .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
 .clear-cart { background: var(--red); color: white; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; }
 .cart-item { display: flex; gap: 10px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #222; }
 .cart-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
 .remove-item { background: none; border: none; color: var(--red); font-size: 20px; cursor: pointer; margin-left: auto; }
 @media(max-width: 768px) { 
    .modal-content { flex-direction: column; }
    .modal-img { width: 100%; height: 300px; }
    .cart-sidebar { width: 100%; } 
    .store-header { flex-direction: column; align-items: center; text-align: center; margin-top: -80px; }
    .form-row { flex-direction: column; gap: 0; }
  }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="logo" onclick="window.location.href='index.html'">MARKET</div>
    <div class="cart-btn" id="cartBtn">🛒<span class="cart-count">0</span></div>
  </div>

  <div class="store-cover" id="storeCover"></div>
  <div class="store-header">
    <div class="store-avatar" id="storeAvatar"></div>
    <div class="store-info">
      <h1 id="storeName">Cargando...</h1>
      <p id="storeCity">Ciudad</p>
      <div class="store-stats">
        <span id="storeProducts">0 Productos</span>
        <span id="storeVisits">0 Visitas</span>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="store-desc" id="storeDesc">
      <h3>Sobre la tienda</h3>
      <p id="storeDescText">Cargando descripción...</p>
    </div>

    <h2 style="font-size: 28px; margin-bottom: 20px;">Productos de la tienda</h2>
    <div class="prod-grid" id="storeProductsGrid"></div>
  </div>

  <!-- MODAL PRODUCTO -->
  <div class="modal-overlay" id="productModal">
    <div class="modal-content">
      <span class="modal-close" onclick="closeProductModal()">×</span>
      <img class="modal-img" id="modalImg" src="">
      <div class="modal-info">
        <h2 id="modalTitle"></h2>
        <div class="modal-price" id="modalPrice"></div>
        <div class="seller-box">
          <p><b>Vendido por:</b> <span id="modalStore"></span></p>
          <p style="font-size:12px; color:#A0A0A0;">Ubicación: <span id="modalCity"></span></p>
        </div>
        <button class="btn-small comprar" id="modalComprarBtn">COMPRAR</button>
        <button class="btn-small agregar" id="modalAddBtn" style="margin-top:10px;">AGREGAR AL CARRITO</button>
      </div>
    </div>
  </div>

  <!-- MODAL CHECKOUT -->
  <div class="modal-overlay" id="checkoutModal">
    <div class="modal-content-checkout">
      <span class="modal-close" onclick="closeCheckoutModal()">×</span>
      <h2>Finalizar Compra</h2>
      <p style="color:#A0A0A0; margin-bottom:20px;">Completa tus datos para cotizar el envío</p>
      <div style="display:flex; gap:20px; margin-bottom:20px;">
        <img id="checkoutImg" src="" style="width:100px; height:100px; border-radius:8px; object-fit:cover;">
        <div>
          <h3 id="checkoutName"></h3>
          <div class="price" id="checkoutPrice"></div>
        </div>
      </div>
      <form class="checkout-form" id="checkoutForm">
        <input type="text" id="buyerName" placeholder="Nombre y Apellido *" required>
        <input type="text" id="buyerDni" placeholder="DNI *" required>
        <input type="email" id="buyerEmail" placeholder="Email *" required>
        <input type="tel" id="buyerPhone" placeholder="Telefono *" required>
        <input type="text" id="buyerAddress" placeholder="Dirección *" required>
        <div class="form-row">
          <input type="text" id="buyerCity" placeholder="Ciudad *" required>
          <input type="text" id="buyerZip" placeholder="Código Postal *" required>
        </div>
        <button type="button" class="btn-small" style="background:var(--blue-ar);" onclick="cotizarEnvio()">COTIZAR ENVIO</button>
        <div class="shipping-result" id="shippingResult"></div>
        <button type="submit" class="btn-pay">PAGAR CON MERCADOPAGO</button>
      </form>
    </div>
  </div>

  <!-- CARRITO -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
      <h3>Tu Carrito</h3>
      <button class="clear-cart" id="clearCartBtn">VACIAR</button>
    </div>
    <div id="cartItems"></div>
    <div style="font-size:24px; font-weight:900; margin:20px 0; text-align:center;" id="cartTotal">Total: $0</div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const storeId = urlParams.get('store');
    let cart = JSON.parse(localStorage.getItem('marketCartStore')) || [];
    let currentCheckoutProduct = null;
    let updateInterval;
    let store = null; // GLOBAL PARA USARLO EN CHECKOUT

    function getImg(p) { return p.imgs? p.imgs[0] : p.img; }

    // FUNCION NUEVA: BAJAR DE LA NUBE
    async function cargarDesdeNube() {
        const data = await getCloudData();
        if(!data) return;
        if(data.AR && data.AR.length > 0) {
            localStorage.setItem('marketProductsAR', JSON.stringify(data.AR));
        }
        loadStore(); // refresca
    }

    async function loadStore() {
      let USERS = JSON.parse(localStorage.getItem('marketUsers')) || [];
      let productsAR = JSON.parse(localStorage.getItem('marketProductsAR')) || [];
      store = USERS.find(u => u.storeId === storeId); // GUARDAR GLOBAL

      if(!store) {
        document.body.innerHTML = '<h1 style="text-align:center; margin-top:100px;">Tienda no encontrada</h1>';
        return;
      }

      const today = new Date().toISOString().split('T')[0];
      if(store.lastVisitDate !== today) { store.visitsToday = 0; store.lastVisitDate = today; }
      store.visits = (store.visits || 0) + 1; 
      store.visitsToday = (store.visitsToday || 0) + 1;
      USERS[USERS.findIndex(u => u.storeId === storeId)] = store;
      localStorage.setItem('marketUsers', JSON.stringify(USERS));

      document.getElementById('storeName').textContent = store.storeName;
      document.getElementById('storeCity').textContent = store.city;
      document.getElementById('storeDescText').textContent = store.desc || 'Esta tienda aun no tiene descripción.';
      if(store.avatar) document.getElementById('storeAvatar').style.backgroundImage = `url(${store.avatar})`;
      if(store.cover) document.getElementById('storeCover').style.backgroundImage = `url(${store.cover})`;

      const myProducts = productsAR.filter(p => p.storeId === storeId);
      document.getElementById('storeProducts').textContent = `${myProducts.length} Productos`;
      document.getElementById('storeVisits').textContent = `${store.visits} Visitas`;

      const grid = document.getElementById('storeProductsGrid');
      grid.innerHTML = myProducts.length === 0? '<p style="grid-column:1/-1; text-align:center; color:#A0A0A0;">Sin productos aun</p>' : '';
      myProducts.forEach(p => {
        grid.innerHTML += `
          <div class="prod-card">
            <img src="${getImg(p)}" onclick='openProductModal(${JSON.stringify(p).replace(/'/g,"&apos;")})'>
            <div class="prod-info">
              <div class="prod-store">${p.store}</div>
              <h3>${p.name}</h3>
              <div class="price">$${p.price.toLocaleString('es-AR')}</div>
              <div class="btn-group">
                <button class="btn-small comprar" onclick='openCheckoutModal(${JSON.stringify(p).replace(/'/g,"&apos;")})'>COMPRAR</button>
                <button class="btn-small agregar" id="btn-${p.id}" onclick='addToCart(${p.id})'>AGREGAR</button>
              </div>
            </div>
          </div>`;
      });
    }
    
    loadStore();
    updateInterval = setInterval(cargarDesdeNube, 3000); // AHORA BAJA DE LA NUBE

    let currentProductModal = null;
    function openProductModal(product) {
      currentProductModal = product;
      document.getElementById('modalImg').src = getImg(product);
      document.getElementById('modalTitle').textContent = product.name;
      document.getElementById('modalPrice').textContent = `$${product.price.toLocaleString('es-AR')}`;
      document.getElementById('modalStore').textContent = product.store;
      document.getElementById('modalCity').textContent = product.city;
      document.getElementById('modalComprarBtn').onclick = () => openCheckoutModal(product);
      document.getElementById('modalAddBtn').onclick = () => addToCart(product.id);
      document.getElementById('productModal').classList.add('active');
    }
    function closeProductModal() { document.getElementById('productModal').classList.remove('active'); }

    function openCheckoutModal(product) {
      currentCheckoutProduct = product;
      document.getElementById('checkoutImg').src = getImg(product);
      document.getElementById('checkoutName').textContent = product.name;
      document.getElementById('checkoutPrice').textContent = `$${product.price.toLocaleString('es-AR')}`;
      document.getElementById('checkoutModal').classList.add('active');
      closeProductModal();
    }
    function closeCheckoutModal() { document.getElementById('checkoutModal').classList.remove('active'); }

    function cotizarEnvio() {
      const cp = document.getElementById('buyerZip').value;
      if(!cp) return alert('Pone tu CP');
      let costoAndreani = 4500;
      let costoCorreo = 3200;
      document.getElementById('shippingResult').style.display = 'block';
      document.getElementById('shippingResult').innerHTML = `
        <b>Elige tu envío:</b><br><br>
        <label><input type="radio" name="envio" value="${costoAndreani}"> Andreani - $${costoAndreani.toLocaleString('es-AR')} - 48hs</label><br>
        <label><input type="radio" name="envio" value="${costoCorreo}"> Correo Argentino - $${costoCorreo.toLocaleString('es-AR')} - 5 a 7 días</label>
      `;
    }

    document.getElementById('checkoutForm').onsubmit = (e) => {
      e.preventDefault();
      const envio = document.querySelector('input[name="envio"]:checked');
      if(!envio) return alert('Elegi un método de envío');
      
      const pedido = {
        id: Date.now(),
        fecha: new Date().toLocaleString(),
        tienda: store.storeName,
        cliente: {
          nombre: document.getElementById('buyerName').value,
          dni: document.getElementById('buyerDni').value,
          email: document.getElementById('buyerEmail').value,
          telefono: document.getElementById('buyerPhone').value,
          direccion: document.getElementById('buyerAddress').value,
          ciudad: document.getElementById('buyerCity').value,
          cp: document.getElementById('buyerZip').value,
        },
        producto: currentCheckoutProduct.name,
        vendedor: store.storeName,
        subtotal: currentCheckoutProduct.price,
        envio: parseFloat(envio.value),
        total: currentCheckoutProduct.price + parseFloat(envio.value),
        moneda: 'ARS',
        estado: 'pagado'
      };
      
      let pedidos = JSON.parse(localStorage.getItem('marketPedidos')) || [];
      pedidos.unshift(pedido);
      localStorage.setItem('marketPedidos', JSON.stringify(pedidos));
      
      alert(`Pedido #${pedido.id} creado!\nTotal: $${pedido.total.toLocaleString('es-AR')}\n\nLa plata queda retenida en MARKET.`);
      closeCheckoutModal();
    }

    function addToCart(id) {
      let productsAR = JSON.parse(localStorage.getItem('marketProductsAR')) || [];
      const product = productsAR.find(p => p.id === id);
      const existing = cart.find(item => item.id === id);
      if(existing) existing.quantity++; else cart.push({...product, quantity: 1});
      localStorage.setItem('marketCartStore', JSON.stringify(cart));
      updateCart();
      const btn = document.getElementById(`btn-${id}`);
      if(btn) { btn.textContent = '✓ AGREGADO'; btn.classList.add('added'); setTimeout(() => {btn.textContent='AGREGAR'; btn.classList.remove('added')}, 1500); }
    }

    function updateCart() {
      const totalItems = cart.reduce((acc, item) => acc + item.quantity, 0);
      document.querySelector('.cart-count').textContent = totalItems;
      document.getElementById('cartItems').innerHTML = cart.length === 0? '<p style="text-align:center; color:#A0A0A0;">Carrito vacio</p>' : '';
      let total = 0;
      cart.forEach(item => {
        total += item.price * item.quantity;
        document.getElementById('cartItems').innerHTML += `
          <div class="cart-item">
            <img src="${getImg(item)}">
            <div style="flex:1;"><p>${item.name}</p><p>$${item.price.toLocaleString('es-AR')} x ${item.quantity}</p></div>
            <button class="remove-item" onclick="removeFromCart(${item.id})">×</button>
          </div>`;
      });
      document.getElementById('cartTotal').textContent = `Total: $${total.toLocaleString('es-AR')}`;
    }

    function removeFromCart(id) { cart = cart.filter(item => item.id !== id); localStorage.setItem('marketCartStore', JSON.stringify(cart)); updateCart(); }
    document.getElementById('clearCartBtn').onclick = () => { cart = []; localStorage.setItem('marketCartStore', JSON.stringify(cart)); updateCart(); }
    document.getElementById('cartBtn').onclick = () => { document.getElementById('cartSidebar').classList.add('active'); document.getElementById('cartOverlay').classList.add('active'); }
    document.getElementById('cartOverlay').onclick = () => { document.getElementById('cartSidebar').classList.remove('active'); document.getElementById('cartOverlay').classList.remove('active'); }
    document.getElementById('productModal').onclick = (e) => { if(e.target.id === 'productModal') closeProductModal(); }
    document.getElementById('checkoutModal').onclick = (e) => { if(e.target.id === 'checkoutModal') closeCheckoutModal(); }

    updateCart();
  </script>
  <script src="sync.js"></script>
</body>
</html>
