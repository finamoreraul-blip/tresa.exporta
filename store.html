<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Store - MARKET</title>
  <meta name="description" content="Shop from this store. Handmade products. Worldwide shipping.">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0A0A0A; --bg-light: #141414; --card: #1C1C1C;
      --text: #F5F5F5; --text-muted: #A0A0A0; --gold: #D4AF37; --gold-hover: #B8941F;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
    body { background: var(--bg); color: var(--text); }
    a { text-decoration: none; color: inherit; }

    /* HEADER */
    header { background: #000; padding: 15px 20px; border-bottom: 1px solid #222; position: sticky; top: 0; z-index: 10; }
   .navbar { max-width: 1400px; margin: auto; display: flex; justify-content: space-between; align-items: center; }
   .logo { color: var(--gold); font-weight: 900; font-size: 24px; letter-spacing: 2px; }
   .back { color: var(--text-muted); font-size: 14px; }
   .back:hover { color: var(--gold); }
   .lang { background: #222; border: 1px solid #333; color: var(--text); padding: 8px 14px; border-radius: 20px; cursor: pointer; font-weight: 600; }

    /* HERO TIENDA */
   .store-hero { background: var(--bg-light); padding: 70px 20px; text-align: center; border-bottom: 1px solid #222; }
   .store-logo-big { width: 120px; height: 120px; border-radius: 50%; background: var(--gold); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: 900; color: #000; }
   .store-hero h1 { font-size: 42px; margin-bottom: 10px; }
   .store-hero p { color: var(--text-muted); font-size: 16px; max-width: 600px; margin: 0 auto; }
   .store-stats { display: flex; justify-content: center; gap: 30px; margin-top: 25px; color: var(--text-muted); font-size: 14px; }

    /* CATÁLOGO */
    section { max-width: 1400px; margin: auto; padding: 60px 20px; }
   .section-title { text-align: center; font-size: 34px; font-weight: 900; margin-bottom: 40px; }
   .prod-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; }
   .prod-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #222; transition: 0.3s; }
   .prod-card:hover { border-color: var(--gold); transform: translateY(-5px); }
   .prod-card img { width: 100%; height: 280px; object-fit: cover; }
   .prod-info { padding: 20px; }
   .prod-info h3 { font-size: 18px; margin-bottom: 10px; }
   .price { font-size: 22px; color: var(--gold); font-weight: 700; margin-bottom: 15px; }
   .btn { background: var(--gold); color: #000; padding: 14px 25px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; width: 100%; transition: 0.3s; }
   .btn:hover { background: var(--gold-hover); }

    /* FOOTER */
    footer { background: #000; padding: 40px 20px; border-top: 1px solid #222; text-align: center; color: var(--text-muted); font-size: 13px; }

    @media(max-width: 768px) {
     .store-hero h1 { font-size: 32px; }
     .store-stats { flex-direction: column; gap: 10px; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="navbar">
      <a href="index.html" class="logo">MARKET</a>
      <a href="index.html" class="back" data-en="← Back to Marketplace" data-es="← Volver al Marketplace">← Back to Marketplace</a>
      <button class="lang" id="langBtn">ES</button>
    </div>
  </header>

  <!-- HERO DE LA TIENDA -->
  <div class="store-hero">
    <div class="store-logo-big" id="storeLogo">A</div>
    <h1 id="storeName">Artisan Gold</h1>
    <p id="storeDesc" data-en="Handmade jewelry from Argentina. 100% authentic." data-es="Joyería artesanal de Argentina. 100% auténtica.">Handmade jewelry from Argentina. 100% authentic.</p>
    <div class="store-stats">
      <span id="productCount">24 Products</span>
      <span id="storeLocation">📍 Argentina</span>
      <span>⭐ 4.9 Rating</span>
    </div>
  </div>

  <!-- CATÁLOGO DE PRODUCTOS -->
  <section>
    <h2 class="section-title" data-en="STORE CATALOG" data-es="CATÁLOGO DE LA TIENDA">STORE CATALOG</h2>
    <div class="prod-grid" id="productGrid">
      <!-- Se carga con JS -->
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    <p data-en="© 2026 MARKET. All rights reserved." data-es="© 2026 MARKET. Todos los derechos reservados.">© 2026 MARKET. All rights reserved.</p>
  </footer>

  <script>
    // BASE DE DATOS DE TIENDAS
    const stores = {
      artisan: {
        name: "Artisan Gold",
        name_es: "Artisan Gold",
        logo: "A",
        location: "Argentina",
        location_es: "Argentina",
        desc: "Handmade jewelry from Argentina. 100% authentic.",
        desc_es: "Joyería artesanal de Argentina. 100% auténtica.",
        products: [
          {name: "Golden Thread Bracelet", name_es: "Pulsera Hilo Dorado", price: "$29.99", img: "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?q=80&w=600"},
          {name: "Silver Moon Necklace", name_es: "Collar Luna Plata", price: "$45.00", img: "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?q=80&w=600"},
          {name: "Premium Gift Box", name_es: "Caja Regalo Premium", price: "$59.99", img: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?q=80&w=600"},
          {name: "Rose Gold Ring", name_es: "Anillo Oro Rosa", price: "$32.50", img: "https://images.unsplash.com/photo-1603561596112-0a132b757442?q=80&w=600"}
        ]
      },
      boho: {
        name: "Boho Dreams",
        name_es: "Boho Dreams",
        logo: "B",
        location: "Mexico",
        location_es: "México",
        desc: "Bohemian style accessories made by hand.",
        desc_es: "Accesorios estilo bohemio hechos a mano.",
        products: [
          {name: "Boho Necklace Set", name_es: "Set Collar Boho", price: "$35.50", img: "https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?q=80&w=600"},
          {name: "Feather Earrings", name_es: "Aros de Pluma", price: "$18.99", img: "https://images.unsplash.com/photo-1633810536532-3c5e0c4f2b0b?q=80&w=600"},
          {name: "Leather Bracelet", name_es: "Pulsera de Cuero", price: "$22.00", img: "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?q=80&w=600"}
        ]
      },
      crystal: {
        name: "Crystal Lux",
        name_es: "Crystal Lux",
        logo: "C",
        location: "Spain",
        location_es: "España",
        desc: "Luxury crystal jewelry with european design.",
        desc_es: "Joyería de cristal de lujo con diseño europeo.",
        products: [
          {name: "Crystal Chandelier", name_es: "Aros Cristal", price: "$48.00", img: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?q=80&w=600"},
          {name: "Diamond Ring", name_es: "Anillo Diamante", price: "$89.99", img: "https://images.unsplash.com/photo-1603561596112-0a132b757442?q=80&w=600"},
          {name: "Luxury Set", name_es: "Set de Lujo", price: "$120.00", img: "https://images.unsplash.com/photo-1515562141207-7a88fb7ce338?q=80&w=600"}
        ]
      }
    };

    // OBTENER ID DE LA URL?id=artisan
    const urlParams = new URLSearchParams(window.location.search);
    const storeId = urlParams.get('id') || 'artisan';
    const store = stores[storeId] || stores['artisan'];

    let currentLang = 'en';

    function loadStore(lang) {
      document.getElementById('storeName').textContent = lang === 'en'? store.name : store.name_es;
      document.getElementById('storeDesc').textContent = lang === 'en'? store.desc : store.desc_es;
      document.getElementById('storeLogo').textContent = store.logo;
      document.getElementById('storeLocation').textContent = `📍 ${lang === 'en'? store.location : store.location_es}`;
      document.getElementById('productCount').textContent = `${store.products.length} ${lang === 'en'? 'Products' : 'Productos'}`;
      document.getElementById('pageTitle').textContent = `${store.name} - MARKET`;

      // Cargar productos
      const grid = document.getElementById('productGrid');
      grid.innerHTML = '';
      store.products.forEach(p => {
        grid.innerHTML += `
          <div class="prod-card">
            <img src="${p.img}" alt="${p.name}">
            <div class="prod-info">
              <h3>${lang === 'en'? p.name : p.name_es}</h3>
              <div class="price">${p.price} USD</div>
              <button class="btn" data-en="ADD TO CART" data-es="AGREGAR AL CARRITO">ADD TO CART</button>
            </div>
          </div>
        `;
      });

      // Traducir todo
      document.querySelectorAll('[data-en]').forEach(el => {
        el.textContent = el.getAttribute(`data-${lang}`);
      });
      langBtn.textContent = lang === 'en'? 'ES' : 'EN';
    }

    loadStore(currentLang);

    const langBtn = document.getElementById('langBtn');
    langBtn.addEventListener('click', () => {
      currentLang = currentLang === 'en'? 'es' : 'en';
      loadStore(currentLang);
    });
  </script>

</body>
</html>
